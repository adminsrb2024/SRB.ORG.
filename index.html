<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sreenagar Rokter Bondhon</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --primary: #d71920; --primary-dark: #9b0d12; --primary-light: #ffebee;
  --text: #2c3e50; --text-light: #7f8c8d; --bg: #f4f6f9;
  --card-bg: #ffffff; --shadow: 0 10px 30px rgba(0,0,0,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI', Roboto, Helvetica, Arial, sans-serif}
body{background:var(--bg);padding-bottom:90px; color: var(--text);}
@keyframes fadeIn { from{opacity:0; transform:translateY(20px)} to{opacity:1; transform:translateY(0)} }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
.header{ background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color:white; padding:15px 20px; position:fixed; width: 100%; top:0; z-index:100; display:flex; align-items:center; justify-content:space-between; box-shadow: 0 4px 20px rgba(215, 25, 32, 0.25); }
.header-left { display: flex; align-items: center; gap: 12px; }
.menuBtn{ font-size:22px; cursor:pointer; }
.header-logo{ width: 42px; height: 42px; object-fit: cover; border-radius: 50%; border: 2px solid rgba(255,255,255,0.8); }
.header-title { font-size: 17px; font-weight: 700; }
.main-container{padding-top:70px; padding-bottom: 20px;}
.container{padding:15px; animation: fadeIn 0.6s ease;}
.container.hidden{display:none}
.card{ background:var(--card-bg); border-radius:16px; padding:20px; box-shadow: var(--shadow); margin-bottom:20px; }
.card-title { font-size: 16px; color: var(--text); font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
.card-title i { color: var(--primary); }
.hero-card { background: linear-gradient(135deg, #fff 0%, #fff5f5 100%); border-left: 5px solid var(--primary); }
.hero-stats { display: flex; justify-content: space-between; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #eee; }
.stat-item { text-align: center; width: 100%; }
.stat-num { font-size: 24px; font-weight: 800; color: var(--primary); }
.stat-label { font-size: 10px; color: var(--text-light); text-transform: uppercase; }
.dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
.dash-card { background: white; padding: 18px 15px; border-radius: 16px; text-align: center; box-shadow: var(--shadow); cursor: pointer; transition: 0.3s; }
.dash-card:hover { transform: translateY(-3px); }
.dash-icon { width: 45px; height: 45px; background: var(--primary-light); color: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; margin: 0 auto 10px; }
.dash-card:hover .dash-icon { background: var(--primary); color: white; }
.dash-title { font-weight: 600; font-size: 14px; }
.form-group { margin-bottom: 15px; }
.form-label { display: block; margin-bottom: 6px; font-size: 12px; color: var(--text-light); font-weight: 600; }
input, select{ width:100%; padding:14px; border:2px solid #f0f0f0; border-radius:10px; background: #fafafa; font-size: 14px; }
input:focus, select:focus { border-color: var(--primary); outline: none; }
button.primary-btn{ width:100%; padding:15px; border:none; border-radius:12px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color:white; font-size:15px; font-weight: 700; cursor:pointer; box-shadow: 0 8px 20px rgba(215, 25, 32, 0.3); display: flex; align-items: center; justify-content: center; gap: 8px; }
.donor-card { display: flex; align-items: center; background: white; padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #eee; }
.donor-avatar { width: 50px; height: 50px; background: var(--primary-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--primary); font-weight: 800; font-size: 16px; margin-right: 15px; }
.donor-info h4 { font-size: 15px; margin-bottom: 4px; }
.donor-info p { font-size: 12px; color: var(--text-light); }
.donor-call-btn { margin-left: auto; background: #25D366; color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 18px; }
.footer{ position:fixed; bottom:0; left:0; width:100%; background: white; padding:12px 20px; border-top: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; z-index: 99; }
.dev-comp { font-size: 13px; color: var(--text); font-weight: 700; }
.hotline-link { background: var(--primary); color: white; padding: 6px 12px; border-radius: 20px; text-decoration: none; font-weight: 600; font-size: 12px; display: inline-flex; align-items: center; gap: 5px; }
.overlay{ position:fixed; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:998; display:none; }
.menu{ position:fixed; left:-300px; top:0; width:280px; height:100%; background:white; transition:.3s; z-index:999; box-shadow: 5px 0 30px rgba(0,0,0,0.1); }
.menu.active{left:0}
.menu-header { background: var(--primary); color: white; padding: 30px 20px; }
.menu a{ display:flex; align-items: center; padding:16px 25px; color:#444; text-decoration:none; font-weight: 500; font-size: 14px; }
.menu a i { margin-right: 15px; color: #aaa; width: 20px; }
.menu a:hover { background: #fff5f5; color: var(--primary); }

/* Splash Screen with Error Handling */
#splash { height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; background: white; z-index: 1000; position: fixed; top: 0; left: 0; width: 100%; }
.splash-logo { width: 100px; height: 100px; border-radius: 50%; margin-bottom: 20px; }
.splash-text { font-size: 20px; color: var(--primary); font-weight: 800; }
.error-box { background: #ffebee; padding: 20px; border-radius: 10px; margin-top: 20px; text-align: center; color: #b71c1c; font-size: 14px; max-width: 300px; }
.loader { width: 30px; height: 30px; border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-top: 20px; }
.hidden {display:none}
</style>
</head>
<body>

<!-- SPLASH SCREEN -->
<div id="splash">
  <img src="https://z-cdn-media.chatglm.cn/files/3bd2ac78-e146-4d71-b99d-ac64f35f4bf9.jpg" class="splash-logo" alt="Logo">
  <div class="splash-text">Sreenagar Rokter Bondhon</div>
  <div id="splash-status" style="margin-top:10px; color:#666; font-size:12px;">Initializing...</div>
  <div id="splash-loader" class="loader"></div>
</div>

<!-- APP CONTAINER -->
<div id="app" class="hidden">
  <div class="header">
    <div class="header-left">
      <span class="menuBtn" onclick="toggleMenu()"><i class="fas fa-bars"></i></span>
      <img src="https://z-cdn-media.chatglm.cn/files/3bd2ac78-e146-4d71-b99d-ac64f35f4bf9.jpg" class="header-logo" alt="Logo">
    </div>
    <div style="text-align:right">
      <div class="header-title">Sreenagar Rokter Bondhon</div>
    </div>
  </div>

  <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

  <div class="menu" id="menu">
    <div class="menu-header"><h3>Menu</h3></div>
    <a onclick="openPage('home')"><i class="fas fa-home"></i> Dashboard</a>
    <a onclick="openPage('findDonor')"><i class="fas fa-search-location"></i> Find Donor</a>
    <a onclick="openPage('beDonor')"><i class="fas fa-user-plus"></i> Register as Donor</a>
  </div>

  <div class="main-container">
    <!-- Home -->
    <div id="home" class="container">
      <div class="card hero-card">
        <div class="card-title"><i class="fas fa-heartbeat"></i> Welcome</div>
        <div class="hero-stats">
          <div class="stat-item">
            <div class="stat-num" id="statDonors">-</div>
            <div class="stat-label">Active Donors</div>
          </div>
        </div>
      </div>
      <div class="dashboard-grid">
        <div class="dash-card" onclick="openPage('findDonor')">
          <div class="dash-icon"><i class="fas fa-search"></i></div>
          <div class="dash-title">Find Donor</div>
        </div>
        <div class="dash-card" onclick="openPage('beDonor')">
          <div class="dash-icon"><i class="fas fa-user-plus"></i></div>
          <div class="dash-title">Be a Donor</div>
        </div>
      </div>
      <div class="card" id="connStatus" style="display:none; border:1px dashed green; background:#e8f5e9;">
         <p style="font-size:12px; color:green; text-align:center;"><i class="fas fa-check-circle"></i> Database Connected</p>
      </div>
    </div>

    <!-- Find Donor -->
    <div id="findDonor" class="container hidden">
      <div class="card">
        <div class="card-title"><i class="fas fa-search"></i> Search Blood</div>
        <select id="searchBlood" onchange="filterDonors()">
          <option value="">Select Blood Group</option>
          <option value="A+">A+</option> <option value="A-">A-</option>
          <option value="B+">B+</option> <option value="B-">B-</option>
          <option value="O+">O+</option> <option value="O-">O-</option>
          <option value="AB+">AB+</option> <option value="AB-">AB-</option>
        </select>
      </div>
      <div id="donorListContainer"></div>
    </div>

    <!-- Be Donor -->
    <div id="beDonor" class="container hidden">
      <div class="card">
        <div class="card-title"><i class="fas fa-user-plus"></i> Register</div>
        <div class="form-group">
          <label class="form-label">Name</label>
          <input id="donorName" placeholder="Full Name">
        </div>
        <div class="form-group">
          <label class="form-label">Blood Group</label>
          <select id="donorBlood">
            <option>A+</option><option>B+</option><option>O+</option><option>AB+</option>
            <option>A-</option><option>B-</option><option>O-</option><option>AB-</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input id="donorPhone" type="tel" placeholder="01XXXXXXXXX">
        </div>
        <div class="form-group">
          <label class="form-label">Location</label>
          <input id="donorLocation" placeholder="Area">
        </div>
        <button class="primary-btn" onclick="registerDonor()">Register Now</button>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-left"><span class="dev-comp">SRP SOFT LTD.</span></div>
    <div class="footer-right"><a href="tel:+8809697755193" class="hotline-link"><i class="fas fa-phone-alt"></i> Hotline</a></div>
  </div>
</div>

<!-- Load Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // ১. চেক করছি ফাইলটি কি কম্পিউটার থেকে খোলা হচ্ছে? 
    if (window.location.protocol === 'file:') {
        document.getElementById('splash-status').innerHTML = 
        '<div class="error-box"><strong>Warning!</strong><br>File double-click kore run korle kaj korbe na.<br>Bitte GitHub Pages e upload koren.</div>';
        document.getElementById('splash-loader').style.display = 'none';
        throw new Error("Local file execution blocked."); // Script থামিয়ে দিলাম
    }

    // ২. Supabase Configuration
    const SUPABASE_URL = 'https://dphpmugfflconqerqgft.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRwaHBtdWdmZmxjb25xZXJxZ2Z0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0Mzc4MDEsImV4cCI6MjA4ODAxMzgwMX0.JwRqpO5wRoZXd6UCAuFYXDeOkwqOjdco60ilevkG8qM';

    let supabase_client;
    
    // ৩. Library লোড হয়েছে কিনা চেক করা
    try {
        if (typeof supabase === 'undefined') throw new Error("Library load failed");
        supabase_client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        document.getElementById('splash-status').innerText = "Connecting to database...";
    } catch (e) {
        document.getElementById('splash-status').innerHTML = '<div class="error-box">Internet Connection or Library Error</div>';
        document.getElementById('splash-loader').style.display = 'none';
    }

    // ৪. অ্যাপ শুরু করা
    async function startApp() {
        try {
            // ডাটাবেস থেকে কাউন্ট আনার চেষ্টা (ডাটাবেস ঠিক আছে কিনা তা টেস্ট করা)
            const { count, error } = await supabase_client.from('donors').select('*', { count: 'exact', head: true });
            
            if (error) {
                // যদি SQL রান করা না থাকে
                document.getElementById('splash-status').innerHTML = 
                    `<div class="error-box">Database Table Not Found!<br>Please run SQL in Supabase.</div>`;
                document.getElementById('splash-loader').style.display = 'none';
                console.error(error);
                return;
            }

            // সব ঠিক থাকলে অ্যাপ ওপেন করা
            document.getElementById('splash').style.display = 'none';
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('connStatus').style.display = 'block';
            document.getElementById('statDonors').innerText = count + '+';

        } catch (err) {
            document.getElementById('splash-status').innerHTML = 
            `<div class="error-box">Connection Failed!<br>${err.message}</div>`;
            document.getElementById('splash-loader').style.display = 'none';
        }
    }

    // ১ সেকেন্ড পরে অ্যাপ শুরু হবে
    setTimeout(startApp, 1000);

    // Menu Functions
    function toggleMenu(){
      document.getElementById("menu").classList.toggle("active");
      document.getElementById("overlay").style.display = document.getElementById("menu").classList.contains("active") ? "block" : "none";
    }
    function hidePages(){ ["home", "findDonor", "beDonor"].forEach(id=> document.getElementById(id).classList.add("hidden")); }
    function openPage(id){ hidePages(); document.getElementById(id).classList.remove("hidden"); if(document.getElementById("menu").classList.contains("active")) toggleMenu(); }

    // Search Function
    async function filterDonors() {
      const blood = document.getElementById("searchBlood").value;
      const container = document.getElementById("donorListContainer");
      if (!blood) return;
      container.innerHTML = "<div class='card' style='text-align:center; padding:20px;'>Searching...</div>";
      
      const { data, error } = await supabase_client.from('donors').select('*').eq('blood', blood);
      container.innerHTML = "";
      if (error) {
          container.innerHTML = "<div class='card' style='color:red;'>Error loading data</div>";
          return;
      }
      if (data.length === 0) {
          container.innerHTML = "<div class='card' style='text-align:center;'>No donors found.</div>";
      } else {
          data.forEach(d => {
              container.innerHTML += `
                <div class="donor-card">
                  <div class="donor-avatar">${d.blood}</div>
                  <div class="donor-info">
                    <h4>${d.name}</h4>
                    <p>${d.location}</p>
                  </div>
                  <a href="tel:${d.phone}" class="donor-call-btn"><i class="fas fa-phone-alt"></i></a>
                </div>`;
          });
      }
    }

    // Register Function
    async function registerDonor() {
      const name = document.getElementById("donorName").value;
      const phone = document.getElementById("donorPhone").value;
      const blood = document.getElementById("donorBlood").value;
      const location = document.getElementById("donorLocation").value;
      if(!name || !phone || !location) { alert("Please fill all fields"); return; }

      const btn = event.target;
      btn.disabled = true; btn.innerHTML = "Saving...";

      const { error } = await supabase_client.from('donors').insert([{ name, blood, phone, location }]);
      
      if(error) {
          alert("Error saving data. Check console.");
          console.error(error);
          btn.disabled = false; btn.innerHTML = "Register Now";
      } else {
          alert("Success! You are now a donor.");
          document.getElementById("donorName").value = "";
          document.getElementById("donorPhone").value = "";
          document.getElementById("donorLocation").value = "";
          openPage('home');
          // Update Count
          const { count } = await supabase_client.from('donors').select('*', { count: 'exact', head: true });
          document.getElementById('statDonors').innerText = count + '+';
      }
    }
</script>
</body>
</html>
